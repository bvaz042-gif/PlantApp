<script>

/* ================= NAV ================= */
function show(id){
	document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
	document.getElementById(id).classList.add("active");
}

/* ================= CÁMARA ================= */
let stream;

function openCamera(){
	show("screen4");
	navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }) .then(s=>{
		stream = s;
		document.getElementById("video").srcObject = s;
	});
}

async function takePhoto(){

	const video = document.getElementById("video");
	const canvas = document.getElementById("canvas");
	const ctx = canvas.getContext("2d");

	canvas.width = video.videoWidth;
	canvas.height = video.videoHeight;
	ctx.drawImage(video,0,0);

	const blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg"));

	stream.getTracks().forEach(t=>t.stop());

	show("screen5");

	const API_KEY = "2b1013D7FFmEp5FXPdwK6FD2";

	const formData = new FormData();
	formData.append("images", blob);
	formData.append("organs", "leaf");

	try{
		const res = await fetch(
		`https://my-api.plantnet.org/v2/identify/all?api-key=${API_KEY}`,
		{method:"POST", body:formData}
		);

		const data = await res.json();

		let nombreAPI = "No identificada";
		if(data.results && data.results.length){
			nombreAPI = data.results[0].species.scientificNameWithoutAuthor.toLowerCase();
		}

        const plantaEncontrada = plantas.find(p =>
		nombreAPI.includes(p.cientifico.toLowerCase()) ||
		p.cientifico.toLowerCase().includes(nombreAPI)
	);
		if(plantaEncontrada){
			document.getElementById("resultado").innerText = plantaEncontrada.nombre;
			}else{
				document.getElementById("resultado").innerText = nombreAPI;
			}
			
			show("screen6");
		}catch{
			alert("No se pudo reconocer la planta");
			show("screen3");
	}
}

/* ================= IA ================= */
function openIA(){
	show("screen9");
}

function preguntarIA(){

	const q = document.getElementById("pregunta").value.toLowerCase();
	const res = document.getElementById("respuesta");

	const planta = plantas.find(p => q.includes(p.nombre.toLowerCase()));

	if(!planta){
		res.innerText = "No encontrada en la base de datos";
		return;
	}

	res.innerText =
	`${planta.nombre}\n\n${planta.descripcion}\n\n💊 ${planta.beneficios.join(", ")}`;
}

/* ================= CATÁLOGO ================= */
function mostrarCatalogo(){
	show("screen7");

	const lista = document.getElementById("lista");
	lista.innerHTML = "";

	plantas.forEach(p=>{
		lista.innerHTML += `
		<div class="card" onclick='verDetalle(${JSON.stringify(p)})'>
			<img src="${p.img}" width="70">
			<div>
				<h3>${p.nombre}</h3>
				<p>${p.descripcion}</p>
			</div>
		</div>`;
	});
}

/* ================= DETALLE ================= */
function verDetalle(planta){

	show("screen8");

	document.getElementById("detalleNombre").innerText = planta.nombre;
	document.getElementById("detalleImg").src = planta.img;

	document.getElementById("descripcion").innerHTML =
	`
	<p>${planta.descripcion}</p>
	<p><b>Uso:</b> ${planta.uso}</p>
	<p><b>Beneficios:</b> ${planta.beneficios.join(", ")}</p>
	`;
}
