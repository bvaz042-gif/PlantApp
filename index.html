<html lang="es">

}

	background:#f9f9f9;
	padding:15px;
	margin:10px;
	border-radius:15px;
	cursor:pointer;
	display:flex;
	gap:10px;
	align-items:center;
}

	justify-content:space-around;
	background:#eee;
	padding:10px;
}

.center-btn {
	background:green;
	color:white;
	padding:15px;
	border-radius:50%;
	cursor:pointer;
}

img { max-width:100%; }

video { width:100%; }
</style>
</head>

<body>

<!-- 🌿 PANTALLA 1 -->
<div id="screen1" class="screen active">
	<div class="content">
		<h1>Medicinal Plants 🌿</h1>
		<p>Descubre plantas con inteligencia artificial</p>
		<button onclick="show('screen2')">Continuar</button>
	</div>
</div>

<!-- 🌿 PANTALLA 2 -->
<div id="screen2" class="screen">
	<div class="content">
		<h2>Condiciones</h2>
		<p>Acepta para continuar</p>
		<button onclick="show('screen3')">Aceptar</button>

		<div onclick="show('screen3')">🏠</div>
		<div class="center-btn" onclick="openCamera()">📷</div>
		<div onclick="openIA()">❓</div>
	</div>

<!-- 📷 CÁMARA -->
<div id="screen4" class="screen">
	<video id="video" autoplay playsinline></video>
	<canvas id="canvas" style="display:none;"></canvas>

	<div class="content">
		<button onclick="takePhoto()">📸 Capturar</button>
	</div>
</div>

<!-- 🔍 CARGA -->
<div id="screen5" class="screen">
	<div class="content"><h2>Identificando...</h2></div>
</div>

<!-- 🌿 RESULTADO -->
<div id="screen6" class="screen">
	<div class="content">
		<h2 id="resultado"></h2>
		<button onclick="show('screen3')">Volver</button>
	</div>
</div>

<div id="screen7" class="screen">
	<div class="content">
		<h2>Plantas</h2>
		<div id="lista"></div>
		<button onclick="show('screen3')">← Volver</button>
	</div>
</div>

<!-- 🌿 DETALLE -->
<div id="screen8" class="screen">

<!-- 🤖 IA -->
<div id="screen9" class="screen">
	<div class="content">
		<input id="pregunta" placeholder="Pregunta sobre una planta">
		<button onclick="preguntarIA()">Preguntar</button>
		<p id="respuesta"></p>
		<button onclick="show('screen3')">← Volver</button>
	</div>

<script>

/* ================= NAV ================= */
function show(id){
	document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
	document.getElementById(id).classList.add("active");
}

/* ================= CÁMARA ================= */
let stream;

function openCamera(){
	show("screen4");

	navigator.mediaDevices.getUserMedia({ video:true })
	.then(s=>{
		stream = s;
		document.getElementById("video").srcObject = s;
	});
}

async function takePhoto(){

	const video = document.getElementById("video");
	const canvas = document.getElementById("canvas");
	const ctx = canvas.getContext("2d");

	canvas.width = video.videoWidth;
	canvas.height = video.videoHeight;
	ctx.drawImage(video,0,0);

	const blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg"));

	stream.getTracks().forEach(t=>t.stop());

	show("screen5");

	const API_KEY = "2b1013D7FFmEp5FXPdwK6FD2";

	const formData = new FormData();
	formData.append("images", blob);
	formData.append("organs", "leaf");

	try{
		const res = await fetch(
		`https://my-api.plantnet.org/v2/identify/all?api-key=${API_KEY}`,
		{method:"POST", body:formData}
		);

		const data = await res.json();

		if(!data.results.length) throw "error";

		const nombre = data.results[0].species.scientificNameWithoutAuthor;

		document.getElementById("resultado").innerText = nombre;

		show("screen6");

	}catch{
		alert("No se pudo reconocer la planta");
		show("screen3");
	}
}

/* ================= IA ================= */
function openIA(){
	show("screen9");
}

function preguntarIA(){

	const q = document.getElementById("pregunta").value.toLowerCase();
	const res = document.getElementById("respuesta");

	const planta = plantas.find(p => q.includes(p.nombre.toLowerCase()));

	if(!planta){
		res.innerText = "No encontrada en la base de datos";
		return;
	}

	res.innerText =
	`${planta.nombre}\n\n${planta.descripcion}\n\n💊 ${planta.beneficios.join(", ")}`;
}

/* ================= CATÁLOGO ================= */
function mostrarCatalogo(){
	show("screen7");

	const lista = document.getElementById("lista");
	lista.innerHTML = "";

	plantas.forEach(p=>{
		lista.innerHTML += `
		<div class="card" onclick='verDetalle(${JSON.stringify(p)})'>
			<img src="${p.img}" width="70">
			<div>
				<h3>${p.nombre}</h3>
				<p>${p.descripcion}</p>
			</div>
		</div>`;
	});
}

/* ================= DETALLE ================= */
function verDetalle(planta){

	show("screen8");

	document.getElementById("detalleNombre").innerText = planta.nombre;
	document.getElementById("detalleImg").src = planta.img;

	document.getElementById("descripcion").innerHTML =
	`
	<p>${planta.descripcion}</p>
	<p><b>Uso:</b> ${planta.uso}</p>
	<p><b>Beneficios:</b> ${planta.beneficios.join(", ")}</p>
	`;
}
